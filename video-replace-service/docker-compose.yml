# ⚠ LEGACY — standalone FastAPI (port 4201, historically 4200) debug stack.
#
# The default / production architecture is core-api 4100-native (Node). This
# compose file exists only for ad-hoc local profiling of the FastAPI variant
# and is intentionally NOT referenced by scripts/start_xiaolou_stack.cmd or
# scripts/start_core_api.cmd.
#
# Do not run this alongside core-api 4100 in production: both paths write the
# PostgreSQL video_replace_jobs table and can race startup reconcile logic.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api-legacy:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiaolou-vrs-legacy:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 4201
    ports:
      - "4201:4201"
    env_file: .env.local
    environment:
      - VR_LEGACY_STANDALONE=1
      - VR_REDIS_HOST=redis
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  # GPU worker — unchanged from the pre-4100-native architecture. Not part
  # of the default stack.
  # worker:
  #   image: xiaolou-vrs:gpu
  #   command: arq app.workers.settings.WorkerSettings
  #   env_file: .env.local
