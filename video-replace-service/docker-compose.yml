  #     - VR_REDIS_HOST=redis
  #   volumes:
  #     - ./data:/app/data
  #     - ./weights:/app/weights
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]
  #   depends_on:
  #     - redis

volumes:
  redis-data:
